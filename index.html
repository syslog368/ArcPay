<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcEX | High-Velocity Mini</title>
    <!-- Lucide for polished icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f111a;
            --card-bg: #1a1d2e;
            --primary: #5e5ce6;
            --secondary: #bf5af2;
            --accent: #2c2f48;
            --text: #ffffff;
            --text-muted: #989fb3;
            --border: rgba(255, 255, 255, 0.08);
            --success: #32d74b;
            --error: #ff453a;
            --font: 'Plus Jakarta Sans', sans-serif;
            --glow: rgba(94, 92, 230, 0.15);
        }

        /* Wallet Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 32px;
            width: 90%;
            max-width: 380px;
            padding: 32px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }

        .wallet-option {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--accent);
            border: 1px solid var(--border);
            border-radius: 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .wallet-option:hover {
            border-color: var(--primary);
            background: rgba(94, 92, 230, 0.1);
            transform: translateY(-2px);
        }

        .wallet-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
        }

        .wallet-name {
            font-weight: 700;
            font-size: 1rem;
        }

        .connected-badge {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(50, 215, 75, 0.1);
            color: var(--success);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            display: none;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(50, 215, 75, 0.2);
            backdrop-filter: blur(4px);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @keyframes fadeInScale { 
            from { opacity: 0; transform: translateY(20px) scale(0.98); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font);
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(94, 92, 230, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(191, 90, 242, 0.1) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 420px;
            position: relative;
            animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Gradient Glow behind card */
        .container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
            z-index: -1;
            filter: blur(40px);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        /* Header & Mode Switcher */
        .header {
            text-align: center;
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
            filter: drop-shadow(0 0 15px var(--glow));
            animation: fadeInScale 1s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .logo-svg {
            width: 100%;
            height: 100%;
        }

        .logo-gradient-1 { stop-color: #ffffff; }
        .logo-gradient-2 { stop-color: #a0aec0; }
        .logo-gradient-3 { stop-color: #e2e8f0; }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            background: var(--accent);
            padding: 4px;
            border-radius: 100px;
            position: relative;
            margin: 0 auto 32px;
            width: fit-content;
            border: 1px solid var(--border);
        }

        .tab {
            padding: 8px 24px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 100px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 2;
        }

        .tab.active {
            color: var(--text);
        }

        .tab-indicator {
            position: absolute;
            top: 4px;
            left: 4px;
            height: calc(100% - 8px);
            width: calc(50% - 4px);
            background: var(--primary);
            border-radius: 100px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1;
            box-shadow: 0 4px 12px rgba(94, 92, 230, 0.3);
        }

        .tabs.swipe-active .tab-indicator {
            transform: translateX(100%);
            background: var(--secondary);
            box-shadow: 0 4px 12px rgba(191, 90, 242, 0.3);
        }

        /* Common Elements */
        .input-box {
            background: var(--accent);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .input-box:focus-within {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.02);
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.05em;
        }

        .balance {
            color: var(--primary);
            cursor: pointer;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1.25rem;
            font-weight: 700;
            outline: none;
            font-family: inherit;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.1);
        }

        .token-tag {
            font-weight: 800;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Swipe Mode Styles */
        .swipe-content {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 10px 0;
        }

        .swipe-content.active {
            display: flex;
        }

        .rate-info {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 32px;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 16px;
            border-radius: 100px;
            font-weight: 600;
        }

        .swipe-track {
            width: 100%;
            height: 72px;
            background: var(--accent);
            border-radius: 100px;
            position: relative;
            padding: 6px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .swipe-text {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            z-index: 1;
            pointer-events: none;
        }

        .swipe-handle {
            position: absolute;
            top: 6px;
            left: 6px;
            width: 60px;
            height: 60px;
            background: var(--secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            z-index: 3;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s ease-out;
        }

        .swipe-handle:active {
            cursor: grabbing;
        }

        .swipe-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, transparent, rgba(191, 90, 242, 0.2));
            z-index: 2;
            pointer-events: none;
        }

        /* Action Button */
        .btn-main {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 24px rgba(94, 92, 230, 0.2);
        }

        .btn-main:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn-main:active {
            transform: scale(0.98);
        }

        .btn-main.sending {
            background: var(--accent);
            cursor: not-allowed;
            color: var(--text-muted);
            box-shadow: none;
        }

        /* Feedback Boxes */
        .feedback {
            margin-top: 24px;
            padding: 16px;
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            display: none;
            animation: fadeInScale 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .feedback.success { background: rgba(50, 215, 75, 0.1); color: var(--success); display: block; }
        .feedback.error { background: rgba(255, 69, 58, 0.1); color: var(--error); display: block; }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div id="walletBadge" class="connected-badge">
                <div style="width: 8px; height: 8px; background: var(--success); border-radius: 50%;"></div>
                <span id="connectedAddr">0x...</span>
            </div>
            <div class="header">
                <!-- Premium SVG Logo Reconstruction: New Arc Style -->
                <div class="brand-logo">
                    <svg viewBox="0 0 100 100" class="logo-svg" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" class="logo-gradient-1" />
                                <stop offset="100%" class="logo-gradient-2" />
                            </linearGradient>
                        </defs>
                        <!-- Stylized Bold 'A' mimicking the new design -->
                        <path d="M50 15 
                                 C25 15, 15 40, 15 85 
                                 L32 85 
                                 C32 50, 40 38, 50 38 
                                 C60 38, 68 50, 68 85 
                                 L85 85 
                                 C85 40, 75 15, 50 15" 
                              fill="url(#logoGrad)" />
                        <path d="M42 65 L65 65 L60 75 L38 75 Z" fill="url(#logoGrad)" opacity="0.8" />
                    </svg>
                </div>
                <h1>Send USDC</h1>
                <div class="tabs" id="modeTabs">
                    <div class="tab active" id="payTab">Pay</div>
                    <div class="tab" id="swipeTab">Swipe</div>
                    <div class="tab-indicator"></div>
                </div>
            </div>

            <!-- Pay Mode Content -->
            <div id="payContent">
                <div class="input-box">
                    <div class="label-row">
                        <span>Amount</span>
                        <span class="balance" onclick="setMax()">Balance: <span id="usdcBal">1000</span> USDC</span>
                    </div>
                    <div class="input-row">
                        <input type="number" id="payAmount" placeholder="0.00">
                        <span class="token-tag">USDC</span>
                    </div>
                </div>

                <div class="input-box">
                    <div class="label-row">
                        <span>Recipient Address</span>
                    </div>
                    <div class="input-row">
                        <input type="text" id="recipient" placeholder="0x... or name">
                    </div>
                </div>

                <button class="btn-main" id="payBtn" onclick="handlePayAction()">
                    <i data-lucide="wallet" size="18" id="payBtnIcon"></i>
                    <span id="payBtnText">Connect Wallet</span>
                </button>
            </div>

            <!-- Swipe Mode Content -->
            <div id="swipeContent" class="swipe-content">
                <div class="rate-info">
                    1 USDC ≈ 0.99 EURC
                </div>
                
                <div class="input-box" style="width: 100%; margin-bottom: 24px;">
                    <div class="label-row">
                        <span>Converting</span>
                        <span class="balance">Balance: <span id="swipeUsdcBal">1000</span> USDC</span>
                    </div>
                    <div class="input-row">
                        <input type="number" id="swipeAmount" placeholder="10.00" oninput="updateConverted()">
                        <span class="token-tag">USDC</span>
                    </div>
                    <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 12px; text-align: left;">
                        Receive: <span style="color: white; font-weight: 700;" id="convertedVal">9.90</span> EURC
                    </div>
                </div>

                <div class="swipe-track" id="swipeTrack" onclick="handleSwipeClick()">
                    <div class="swipe-progress" id="swipeProgress"></div>
                    <div class="swipe-text" id="swipeText">Connect Wallet to Swipe</div>
                    <div class="swipe-handle" id="swipeHandle">
                        <i data-lucide="wallet" color="white" size="24" id="swipeHandleIcon"></i>
                    </div>
                </div>

                <div style="margin-top: 16px; font-size: 0.75rem; color: var(--text-muted); font-weight: 600;">
                    Your EURC Vault: <span style="color: white;" id="eurcBal">500</span> EURC
                </div>
            </div>

            <div id="feedback" class="feedback"></div>
        </div>
    </div>

    <div id="walletModal" class="modal-overlay">
        <div class="modal">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h3 style="font-weight: 800;">Connect Wallet</h3>
                <i data-lucide="x" style="cursor: pointer; opacity: 0.5;" onclick="closeWalletModal()"></i>
            </div>
            <div class="wallet-option" onclick="connectWallet('OKX')">
                <img src="https://picsum.photos/seed/okx/64/64" alt="OKX" class="wallet-icon" referrerpolicy="no-referrer">
                <div class="wallet-name">OKX Wallet</div>
            </div>
            <div class="wallet-option" onclick="connectWallet('Phantom')">
                <img src="https://picsum.photos/seed/phantom/64/64" alt="Phantom" class="wallet-icon" referrerpolicy="no-referrer">
                <div class="wallet-name">Phantom</div>
            </div>
            <div class="wallet-option" onclick="connectWallet('MetaMask')">
                <img src="https://picsum.photos/seed/metamask/64/64" alt="MetaMask" class="wallet-icon" referrerpolicy="no-referrer">
                <div class="wallet-name">MetaMask</div>
            </div>
        </div>
    </div>

    <script>
        // Init Icons
        lucide.createIcons();

        // App States
        let state = {
            mode: 'pay', // 'pay' or 'swipe'
            balances: {
                usdc: 1000.00,
                eurc: 500.00
            },
            isProcessing: false,
            rate: 0.99,
            wallet: {
                connected: false,
                address: null,
                provider: null
            }
        };

        // DOM Elements
        const elements = {
            payTab: document.getElementById('payTab'),
            swipeTab: document.getElementById('swipeTab'),
            modeTabs: document.getElementById('modeTabs'),
            payContent: document.getElementById('payContent'),
            swipeContent: document.getElementById('swipeContent'),
            usdcBal: document.getElementById('usdcBal'),
            swipeUsdcBal: document.getElementById('swipeUsdcBal'),
            eurcBal: document.getElementById('eurcBal'),
            payAmount: document.getElementById('payAmount'),
            recipient: document.getElementById('recipient'),
            payBtn: document.getElementById('payBtn'),
            payBtnText: document.getElementById('payBtnText'),
            payBtnIcon: document.getElementById('payBtnIcon'),
            feedback: document.getElementById('feedback'),
            swipeAmount: document.getElementById('swipeAmount'),
            convertedVal: document.getElementById('convertedVal'),
            swipeHandle: document.getElementById('swipeHandle'),
            swipeHandleIcon: document.getElementById('swipeHandleIcon'),
            swipeTrack: document.getElementById('swipeTrack'),
            swipeProgress: document.getElementById('swipeProgress'),
            swipeText: document.getElementById('swipeText'),
            walletModal: document.getElementById('walletModal'),
            walletBadge: document.getElementById('walletBadge'),
            connectedAddr: document.getElementById('connectedAddr')
        };

        /**
         * WALLET LOGIC
         */
        function openWalletModal() {
            elements.walletModal.style.display = 'flex';
        }

        function closeWalletModal() {
            elements.walletModal.style.display = 'none';
        }

        async function connectWallet(provider) {
            state.wallet.connected = true;
            state.wallet.provider = provider;
            // Simulated random address
            state.wallet.address = '0x' + Array.from({length: 8}, () => Math.floor(Math.random() * 16).toString(16)).join('') + '...' + Array.from({length: 4}, () => Math.floor(Math.random() * 16).toString(16)).join('');
            
            closeWalletModal();
            updateUIForWallet();
            showFeedback(`${provider} connected successfully!`, 'success');
        }

        function updateUIForWallet() {
            if (state.wallet.connected) {
                elements.walletBadge.style.display = 'flex';
                elements.connectedAddr.textContent = state.wallet.address;
                
                // Update Pay Button
                elements.payBtnText.textContent = "Send USDC";
                elements.payBtnIcon.setAttribute('data-lucide', 'send');
                
                // Update Swipe Track
                elements.swipeText.textContent = "Swipe to Convert";
                elements.swipeHandleIcon.setAttribute('data-lucide', 'chevron-right');
            } else {
                elements.walletBadge.style.display = 'none';
                elements.payBtnText.textContent = "Connect Wallet";
                elements.payBtnIcon.setAttribute('data-lucide', 'wallet');
                elements.swipeText.textContent = "Connect Wallet to Swipe";
                elements.swipeHandleIcon.setAttribute('data-lucide', 'wallet');
            }
            lucide.createIcons();
        }

        function handlePayAction() {
            if (!state.wallet.connected) {
                openWalletModal();
            } else {
                handlePay();
            }
        }

        function handleSwipeClick() {
            if (!state.wallet.connected) {
                openWalletModal();
            }
        }

        /**
         * MODE TOGGLE LOGIC
         */
        elements.payTab.addEventListener('click', () => switchMode('pay'));
        elements.swipeTab.addEventListener('click', () => switchMode('swipe'));

        function switchMode(mode) {
            state.mode = mode;
            elements.payTab.classList.toggle('active', mode === 'pay');
            elements.swipeTab.classList.toggle('active', mode === 'swipe');
            elements.modeTabs.classList.toggle('swipe-active', mode === 'swipe');
            
            elements.payContent.classList.toggle('hidden', mode !== 'pay');
            elements.swipeContent.classList.toggle('active', mode === 'swipe');
            
            hideFeedback();
            resetSwipe();
            updateBalances();
        }

        /**
         * BALANCE UPDATE LOGIC
         */
        function updateBalances() {
            elements.usdcBal.textContent = state.balances.usdc.toFixed(2);
            elements.swipeUsdcBal.textContent = state.balances.usdc.toFixed(2);
            elements.eurcBal.textContent = state.balances.eurc.toFixed(2);
        }

        function setMax() {
            elements.payAmount.value = state.balances.usdc;
        }

        function updateConverted() {
            const val = parseFloat(elements.swipeAmount.value) || 0;
            elements.convertedVal.textContent = (val * state.rate).toFixed(2);
        }

        /**
         * PAY FEATURE LOGIC
         */
        async function handlePay() {
            if (state.isProcessing) return;
            
            const amt = parseFloat(elements.payAmount.value);
            const rcpt = elements.recipient.value.trim();

            if (!amt || amt <= 0) {
                showFeedback("Please enter a valid amount.", "error");
                return;
            }
            if (amt > state.balances.usdc) {
                showFeedback("Insufficient USDC balance.", "error");
                return;
            }
            if (!rcpt) {
                showFeedback("Please enter a recipient address.", "error");
                return;
            }

            // Simulate sending
            state.isProcessing = true;
            elements.payBtn.innerHTML = `<div class="spinner"></div> Sending...`;
            elements.payBtn.classList.add('sending');
            hideFeedback();

            setTimeout(() => {
                state.balances.usdc -= amt;
                state.isProcessing = false;
                elements.payBtn.innerHTML = `<i data-lucide="send" size="18"></i> Send USDC`;
                elements.payBtn.classList.remove('sending');
                lucide.createIcons();
                updateBalances();
                const hash = '0x' + Array.from({length: 64}, () => Math.floor(Math.random() * 16).toString(16)).join('');
                showFeedback(`Successfully sent ${amt} USDC to ${rcpt}!`, "success", hash);
                elements.payAmount.value = "";
                elements.recipient.value = "";
            }, 1800);
        }

        /**
         * SWIPE GESTURE LOGIC
         */
        let drag = {
            active: false,
            startX: 0,
            x: 0,
            limit: 0
        };

        elements.swipeHandle.addEventListener('mousedown', (e) => {
            if (!state.wallet.connected) return;
            startSwipe(e);
        });
        elements.swipeHandle.addEventListener('touchstart', (e) => {
            if (!state.wallet.connected) return;
            startSwipe(e.touches[0]);
        });

        window.addEventListener('mousemove', (e) => moveSwipe(e.clientX));
        window.addEventListener('touchmove', (e) => moveSwipe(e.touches[0].clientX));

        window.addEventListener('mouseup', endSwipe);
        window.addEventListener('touchend', endSwipe);

        function startSwipe(e) {
            if (state.isProcessing) return;
            drag.active = true;
            drag.startX = e.clientX || e;
            drag.limit = elements.swipeTrack.offsetWidth - elements.swipeHandle.offsetWidth - 12;
            elements.swipeHandle.style.transition = "none";
            elements.swipeProgress.style.transition = "none";
        }

        function moveSwipe(currentX) {
            if (!drag.active) return;
            let diff = currentX - drag.startX;
            diff = Math.max(0, Math.min(diff, drag.limit));
            drag.x = diff;
            
            elements.swipeHandle.style.transform = `translateX(${diff}px)`;
            elements.swipeProgress.style.width = `${(diff / drag.limit) * 100}%`;
        }

        function endSwipe() {
            if (!drag.active) return;
            drag.active = false;
            
            if (drag.x >= drag.limit * 0.95) {
                executeConversion();
            } else {
                resetSwipe();
            }
        }

        function resetSwipe() {
            drag.x = 0;
            elements.swipeHandle.style.transition = "transform 0.5s cubic-bezier(0.16, 1, 0.3, 1)";
            elements.swipeProgress.style.transition = "width 0.5s cubic-bezier(0.16, 1, 0.3, 1)";
            elements.swipeHandle.style.transform = `translateX(0px)`;
            elements.swipeProgress.style.width = `0%`;
        }

        function executeConversion() {
            const amt = parseFloat(elements.swipeAmount.value) || 10;
            if (amt > state.balances.usdc) {
                showFeedback("Insufficient USDC balance.", "error");
                resetSwipe();
                return;
            }

            state.isProcessing = true;
            elements.swipeHandle.innerHTML = `<div class="spinner" style="border-top-color: white;"></div>`;
            hideFeedback();

            setTimeout(() => {
                const recv = amt * state.rate;
                state.balances.usdc -= amt;
                state.balances.eurc += recv;
                state.isProcessing = false;
                
                elements.swipeHandle.innerHTML = `<i data-lucide="check" color="white" size="24"></i>`;
                lucide.createIcons();
                updateBalances();
                const hash = '0x' + Array.from({length: 64}, () => Math.floor(Math.random() * 16).toString(16)).join('');
                showFeedback(`Swapped ${amt} USDC for ${recv.toFixed(2)} EURC!`, "success", hash);
                
                setTimeout(() => {
                    resetSwipe();
                    elements.swipeHandle.innerHTML = `<i data-lucide="chevron-right" color="white" size="24"></i>`;
                    lucide.createIcons();
                }, 1500);
            }, 1200);
        }

        /**
         * FEEDBACK HELPERS
         */
        function showFeedback(msg, type, hash = null) {
            elements.feedback.innerHTML = `<div>${msg}</div>`;
            if (hash) {
                elements.feedback.innerHTML += `
                    <a href="https://testnet.arcscan.app/tx/${hash}" 
                       target="_blank" 
                       style="display: block; margin-top: 8px; font-size: 0.75rem; color: inherit; text-decoration: underline; opacity: 0.8; cursor: pointer;">
                       View on ArcScan: ${hash.substring(0, 10)}...${hash.substring(58)}
                    </a>`;
            }
            elements.feedback.className = `feedback ${type}`;
        }

        function hideFeedback() {
            elements.feedback.className = `feedback`;
        }

        // Init layout
        updateBalances();
        updateConverted();

    </script>
</body>
</html>
